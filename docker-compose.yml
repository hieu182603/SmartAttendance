version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=4000
      - FRONTEND_URL=${FRONTEND_URL}
      - AI_SERVICE_URL=http://ai-service:8001
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY}
      - HOST=0.0.0.0
      - NODE_ENV=production
    depends_on:
      - ai-service
    restart: always

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - API_KEY=${AI_SERVICE_API_KEY}
      - MONGODB_ATLAS_CLUSTER_URI=${MONGO_URI}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    restart: always

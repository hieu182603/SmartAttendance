version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  backend:
    build:
      # Context MUST be repo root so the pnpm workspace (incl. @smartattendance/shared) resolves.
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - PORT=4000
      - FRONTEND_URL=${FRONTEND_URL}
      # Extra allowed CORS origins (comma-separated), e.g. Vercel preview URLs
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - AI_SERVICE_URL=http://ai-service:8001
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY}
      - HOST=0.0.0.0
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      # Cloudinary Configuration
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # Email Configuration
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_SECURE=${EMAIL_SECURE}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      # Sensitive field encryption (bank account at rest)
      - BANK_ACCOUNT_ENCRYPTION_KEY=${BANK_ACCOUNT_ENCRYPTION_KEY}
      # PayOS (billing / payment)
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID}
      - PAYOS_API_KEY=${PAYOS_API_KEY}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY}
      # Observability (optional)
      - LOG_LEVEL=${LOG_LEVEL}
      # Google Analytics Configuration
      - GA_PROPERTY_ID=${GA_PROPERTY_ID}
      - GA_SERVICE_ACCOUNT_KEY_PATH=${GA_SERVICE_ACCOUNT_KEY_PATH}
      # Base64-encoded service account JSON (alternative to file path — set ONE of the two)
      - GA_SERVICE_ACCOUNT_KEY=${GA_SERVICE_ACCOUNT_KEY}
    volumes:
      # Mount GA service account key file into the container (skip if using GA_SERVICE_ACCOUNT_KEY base64)
      - ./packages/backend/attendance-smart-476502-77552ada5ec4.json:/app/packages/backend/attendance-smart-476502-77552ada5ec4.json:ro
    depends_on:
      - ai-service
      - redis
    restart: always

  ai-service:
    build:
      context: ./packages/ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - API_KEY=${AI_SERVICE_API_KEY}
      - MONGODB_ATLAS_CLUSTER_URI=${MONGO_URI}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      # CORS allowlist for the AI service (who may call it — backend + web). Distinct
      # from the backend's ALLOWED_ORIGINS, so it has its own variable.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS_AI}
    restart: always

volumes:
  redis-data:

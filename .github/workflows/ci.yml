name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Cancel in-flight runs for the same branch/PR on new pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # 1. LINT  (blocks build + e2e if it fails)
  # ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm --workspace backend run lint

      - name: Lint frontend
        run: npm --workspace frontend run lint

  # ──────────────────────────────────────────
  # 2. BACKEND TESTS
  # ──────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm --workspace backend run test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_jwt_secret_at_least_32_characters_long
          REFRESH_TOKEN_SECRET: ci_test_refresh_secret_at_least_32_chars

  # ──────────────────────────────────────────
  # 3. FRONTEND E2E  (Playwright smoke)
  # ──────────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/package-lock.json', 'package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Install Playwright system deps (cached run)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          CI: "true"
          VITE_API_URL: http://localhost:4000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────
  # 4. BUILD  (depends on lint)
  # ──────────────────────────────────────────
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000

  # ──────────────────────────────────────────
  # 5. TYPECHECK  (non-blocking for now)
  #    Tighten to blocking after fixing pre-existing TS errors.
  #    Set continue-on-error: false to make it block PR merges.
  # ──────────────────────────────────────────
  typecheck:
    name: TypeScript check (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm --workspace frontend run typecheck

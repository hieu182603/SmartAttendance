name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Cancel in-flight runs for the same branch/PR on new pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # 1. LINT  (blocks build + e2e if it fails)
  # ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --filter @smartattendance/backend lint

      - name: Lint web
        run: pnpm --filter @smartattendance/web lint

  # ──────────────────────────────────────────
  # 2. BACKEND TESTS
  # ──────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter @smartattendance/backend test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_jwt_secret_at_least_32_characters_long
          REFRESH_TOKEN_SECRET: ci_test_refresh_secret_at_least_32_chars

  # ──────────────────────────────────────────
  # 3. FRONTEND E2E  (Playwright)
  #    Spins up real MongoDB + Redis + backend so auth/protected-route tests
  #    can validate the full AuthContext bootstrap path.
  # ──────────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017/smartattendance_e2e
      # Redis intentionally disabled for E2E: with single-slot refresh token
      # rotation enabled, parallel Playwright tests sharing a saved storageState
      # cookie all hit the SAME pre-rotation token. First test rotates T1→T2 in
      # Redis; every subsequent test arrives with T1 and gets "Refresh token
      # revoked" → forceLogout → /login. Without Redis the binding check is
      # skipped (JWT signature only), so all tests can reuse the cookie.
      # Refresh-rotation logic remains covered by backend integration tests
      # (TC-AUTH-009 in __tests__/integration/auth.test.js).
      REDIS_ENABLED: "false"
      JWT_SECRET: ci_test_jwt_secret_at_least_32_characters_long
      REFRESH_TOKEN_SECRET: ci_test_refresh_secret_at_least_32_chars
      PORT: "4000"
      FRONTEND_URL: http://localhost:5173
      AI_SERVICE_URL: http://localhost:8001
      AI_SERVICE_API_KEY: ci_test_ai_key
      EMAIL_HOST: ""

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @smartattendance/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cached run)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @smartattendance/web exec playwright install-deps chromium

      - name: Seed E2E test users
        run: pnpm --filter @smartattendance/backend seed

      - name: Start backend (background)
        run: |
          pnpm --filter @smartattendance/backend start > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend ready
        run: npx --yes wait-on http://localhost:4000/api/health -t 60000

      - name: Run E2E tests
        run: pnpm --filter @smartattendance/web test:e2e
        env:
          CI: "true"
          VITE_API_URL: http://localhost:4000

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" 2>/dev/null || true; fi

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────
  # 4. BUILD  (depends on lint)
  # ──────────────────────────────────────────
  build:
    name: Build web
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @smartattendance/web build
        env:
          VITE_API_URL: http://localhost:4000

  # ──────────────────────────────────────────
  # 5. TYPECHECK
  #    Runs against tsconfig.ci.json (relaxed: noUnusedLocals/strict off)
  #    because the strict tsconfig.json still has ~16 pre-existing errors
  #    (mostly TS6133 unused vars + 1 LivenessState undefined-vs-null mismatch).
  #    Backlog: tighten tsconfig.ci.json to match tsconfig.json by Sprint 3.
  # ──────────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm --filter @smartattendance/web typecheck

name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Cancel in-flight runs for the same branch/PR on new pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # 1. LINT  (blocks build + e2e if it fails)
  # ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --filter @smartattendance/backend lint

      - name: Lint web
        run: pnpm --filter @smartattendance/web lint

  # ──────────────────────────────────────────
  # 2. BACKEND TESTS
  # ──────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter @smartattendance/backend test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_jwt_secret_at_least_32_characters_long
          REFRESH_TOKEN_SECRET: ci_test_refresh_secret_at_least_32_chars

  # ──────────────────────────────────────────
  # 3. FRONTEND E2E  (Playwright smoke)
  #    Non-blocking: auth tests + protected route tests need a live backend
  #    (MongoDB + Redis + Express @ :4000) to validate login + AuthContext
  #    bootstrap. CI does not yet provision that — see Sprint backlog item
  #    "Day 5: full E2E infra in CI". Until then, frontend-e2e runs for
  #    visibility but does not block merge.
  # ──────────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E (non-blocking)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @smartattendance/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cached run)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @smartattendance/web exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @smartattendance/web test:e2e
        env:
          CI: "true"
          VITE_API_URL: http://localhost:4000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────
  # 4. BUILD  (depends on lint)
  # ──────────────────────────────────────────
  build:
    name: Build web
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @smartattendance/web build
        env:
          VITE_API_URL: http://localhost:4000

  # ──────────────────────────────────────────
  # 5. TYPECHECK  (non-blocking for now)
  #    Tighten to blocking after fixing pre-existing TS errors.
  #    Set continue-on-error: false to make it block PR merges.
  # ──────────────────────────────────────────
  typecheck:
    name: TypeScript check (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm --filter @smartattendance/web typecheck
